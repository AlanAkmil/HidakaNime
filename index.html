<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iFilm - Nonton Donghua & Anime Subtitle Indonesia</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="topbar">
    <div class="brand"><span class="brand-icon">▶</span> iFilm</div>
    <div class="top-icons">
      <button id="searchToggle">🔍</button>
      <button>🔔</button>
      <button>➡️</button>
      <button>☰</button>
    </div>
  </div>

  <div class="search-wrap" id="searchWrap">
    <form id="searchForm" style="display:flex; flex:1; gap:8px;">
      <input id="searchInput" type="text" placeholder="Cari donghua / anime...">
      <button type="submit">CARI</button>
    </form>
  </div>

  <div class="section-chip-wrap">
    <div class="section-chip">🇨🇳 DONGHUA</div>
  </div>
  <div class="grid" id="donghuaGrid"></div>
  <div class="load-more-wrap">
    <button class="btn-block" id="donghuaMore">MUAT LEBIH BANYAK</button>
  </div>

  <div class="section-chip-wrap">
    <div class="section-chip">🇯🇵 ANIME</div>
  </div>
  <div class="grid" id="animeGrid"></div>
  <div class="load-more-wrap">
    <button class="btn-block" id="animeMore">MUAT LEBIH BANYAK ANIME</button>
  </div>

  <div class="debug-toggle" id="debugToggle">Debug JSON</div>
  <div class="debug-box" id="debugBox"></div>

  <div class="bottomnav">
    <a href="index.html" class="active"><span class="icon">🏠</span>Beranda</a>
    <a href="schedule.html"><span class="icon">📅</span>Jadwal</a>
    <a href="#"><span class="icon">💬</span>Forum</a>
    <a href="#"><span class="icon">📖</span>Wiki</a>
    <a href="#"><span class="icon">👤</span>Profil</a>
  </div>

  <script src="js/common.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
